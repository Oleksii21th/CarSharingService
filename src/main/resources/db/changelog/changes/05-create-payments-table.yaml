databaseChangeLog:
  - changeSet:
      id: create-payments-table
      author: Oleksii Babych
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: payment
      changes:
        - createTable:
            tableName: payment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: rental_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: session_url
                  type: VARCHAR(255)
              - column:
                  name: session_id
                  type: VARCHAR(255)
              - column:
                  name: amount
                  type: DECIMAL(10,2)
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false