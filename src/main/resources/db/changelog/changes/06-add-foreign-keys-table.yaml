databaseChangeLog:
  - changeSet:
      id: add-foreign-keys
      author: Oleksii Babych
      preConditions:
          onFail: MARK_RAN
          not:
              foreignKeyConstraintExists:
                  foreignKeyName: fk_rental_car
      changes:
        - addForeignKeyConstraint:
            baseTableName: rental
            baseColumnNames: car_id
            referencedTableName: car
            referencedColumnNames: id
            constraintName: fk_rental_car
        - addForeignKeyConstraint:
            baseTableName: rental
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_rental_user
        - addForeignKeyConstraint:
            baseTableName: payment
            baseColumnNames: rental_id
            referencedTableName: rental
            referencedColumnNames: id
            constraintName: fk_payment_rental